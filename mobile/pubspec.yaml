name: rudrayani_mobile
description: Rudrayani Fintech collection-agency CRM — mobile app for agents and team leaders.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking & auth
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  device_info_plus: ^11.2.0

  # Navigation
  go_router: ^14.6.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  geolocator: ^14.0.2
  flutter_foreground_task: ^9.2.2
  connectivity_plus: ^7.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.3
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
